<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scenic Spots</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="site-title">景点列表</h1>
      </div>
    </header>

    <main class="container">
      <section aria-label="search">
        <input
          id="searchInput"
          type="search"
          placeholder="搜索景点名称/城市"
          autocomplete="off"
        />
      </section>

      <section aria-label="scenic spots list">
        <ul id="spotsList" class="spots-list"></ul>
      </section>
    </main>

    <script src="./src/app.js" defer></script>
  </body>
</html>
